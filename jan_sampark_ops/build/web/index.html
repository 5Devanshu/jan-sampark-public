<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Jan Sampark Operations Console" />

  <!-- iOS meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="JS Ops" />

  <title>Jan Sampark Ops</title>
  <link rel="manifest" href="manifest.json" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <!-- Prevent flash of unstyled content -->
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #F8FAFC;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont,
                   'Segoe UI', Roboto, sans-serif;
    }

    /* Loading spinner shown before Flutter boots */
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
    }

    #loading .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #loading .logo {
      width: 44px;
      height: 44px;
      background: #1D4ED8;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #loading .logo svg {
      width: 26px;
      height: 26px;
      fill: white;
    }

    #loading h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      color: #0F172A;
    }

    #loading p {
      margin: 0;
      font-size: 13px;
      color: #64748B;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #E2E8F0;
      border-top-color: #1D4ED8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Native loading indicator before Flutter renders -->
  <div id="loading">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75
                   7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12
                   -2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5
                   2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
      </div>
      <div>
        <h1>Jan Sampark</h1>
        <p>Operations Console</p>
      </div>
    </div>
    <div class="spinner"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        loading.style.transition = 'opacity 0.3s ease';
        setTimeout(() => loading.remove(), 300);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
