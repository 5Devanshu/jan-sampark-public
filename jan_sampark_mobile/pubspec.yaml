name: jan_sampark_mobile
description: Jan Sampark — Political Communication Platform for Voters, Leaders and Corporators
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ─────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ───────────────────────────────
  go_router: ^13.2.1

  # ── Network ──────────────────────────────────
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # ── Local Storage ────────────────────────────
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # ── UI / Fonts ───────────────────────────────
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  fl_chart: ^0.68.0

  # ── File / Media ─────────────────────────────
  image_picker: ^1.1.2
  file_picker: ^8.0.6
  permission_handler: ^11.3.1

  # ── Utilities ────────────────────────────────
  intl: ^0.20.2
  url_launcher: ^6.3.0
  uuid: ^4.4.0

  # ── Localisation ─────────────────────────────
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/illustrations/
    - assets/lottie/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter-Bold.ttf
          weight: 700